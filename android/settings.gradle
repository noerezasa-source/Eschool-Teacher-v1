pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"

// ==============================================================================
// CARA PAMUNGKAS: Memaksa compiler Android (AGP) global untuk menaikkan compileSdk
// pada setiap sub-project/plugin saat dievaluasi oleh sistem Gradle.
// ==============================================================================
gradle.lifecycle.beforeProject { project ->
    project.plugins.withType(com.android.build.gradle.BasePlugin) {
        project.android {
            compileSdk = 34
            buildToolsVersion = "34.0.0"
        }
    }
}